<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARC Checkout V10</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Arial,sans-serif;
  background:#eef8ff;
  color:#0f172a;
}
.wrapper{
  max-width:1450px;
  margin:auto;
  padding:24px;
}
.grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:22px;
}
.card{
  background:#fff;
  border:1px solid #d9ebff;
  border-radius:18px;
  padding:22px;
}
h2{
  font-size:28px;
  margin-bottom:18px;
}
label{
  display:block;
  font-size:12px;
  font-weight:700;
  color:#475569;
  margin-bottom:7px;
  text-transform:uppercase;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border:1px solid #d8e7f8;
  border-radius:12px;
  margin-bottom:14px;
}
textarea{
  min-height:100px;
  resize:vertical;
}
.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
button{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-weight:700;
  cursor:pointer;
}
.btn-primary{background:#06b6d4;color:#fff}
.btn-dark{background:#0f172a;color:#fff}
.btn-blue{background:#3b82f6;color:#fff}
.btn-green{background:#10b981;color:#fff}
.btn-gray{background:#64748b;color:#fff}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:6px;
}
.invoice-item{
  border:1px solid #d9ebff;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
}
.invoice-title{
  font-size:18px;
  font-weight:800;
}
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.created{background:#f1f5f9;color:#334155}
.paid{background:#dcfce7;color:#166534}
.big{
  font-size:72px;
  line-height:1;
  font-weight:900;
  margin:8px 0 18px;
}
.small{
  font-size:13px;
  color:#64748b;
}
.muted{
  color:#64748b;
}
.wallet{
  border:1px solid #dbeafe;
  border-radius:18px;
  padding:18px;
  margin-top:20px;
}
.wallet-grid{
  display:grid;
  grid-template-columns:1fr 180px;
  gap:20px;
}
.checkout-grid{
  display:grid;
  grid-template-columns:1fr 280px;
  gap:22px;
}
.qrbox{
  border:1px solid #dbeafe;
  border-radius:18px;
  padding:18px;
  text-align:center;
}
.qrbox img{
  width:220px;
  height:220px;
}
.success{color:#059669;font-weight:700}
.error{color:#dc2626;font-weight:700}

@media(max-width:1100px){
.grid,.checkout-grid,.wallet-grid{
grid-template-columns:1fr;
}
.big{font-size:56px}
}
</style>
</head>

<body>
<div class="wrapper">
<div class="grid">

<!-- LEFT -->
<div class="card">
<h2>Create Invoice</h2>

<label>Title</label>
<input id="title" placeholder="Coffee"/>

<div class="row2">
<div>
<label>Amount (USDC)</label>
<input id="amount" placeholder="0.8"/>
</div>

<div>
<label>Target Chain</label>
<select id="chain">
<option>Arc</option>
</select>
</div>
</div>

<label>Recipient Address</label>
<input id="recipient" placeholder="Leave empty to use merchant wallet"/>

<label>Note</label>
<textarea id="note"></textarea>

<div class="actions">
<button class="btn-primary" onclick="createInvoice()">Create Invoice</button>
<button class="btn-dark" onclick="loadInvoices()">Load Invoices</button>
</div>

<h2 style="margin-top:20px">Invoices</h2>
<div id="invoiceList"></div>
</div>

<!-- RIGHT -->
<div class="card">
<div class="checkout-grid">

<div>
<div class="muted">INVOICE TITLE</div>
<h2 id="viewTitle">No invoice selected</h2>

<div class="muted">AMOUNT</div>
<div class="big" id="viewAmount">0 USDC</div>

<div id="statusBadge" class="badge created">CREATED</div>

<div style="margin-top:16px" class="muted">INVOICE ID</div>
<div id="viewId">-</div>

<div style="margin-top:16px" class="muted">RECIPIENT</div>
<div id="viewRecipient">-</div>

<div class="actions" style="margin-top:16px">
<button class="btn-dark" onclick="copyAddress()">Copy Address</button>
</div>

<div class="wallet">
<h2 style="font-size:34px">Wallet</h2>

<div class="wallet-grid">
<div>
<div class="small">
<b>CONNECTED</b><br>
<span id="walletAddress">Disconnected</span>
</div>

<div class="small" style="margin-top:16px">
<b>ARC USDC BALANCE</b>
</div>

<div class="big" style="font-size:48px" id="walletBalance">- USDC</div>
</div>

<div>
<div class="small">
<b>CHAIN ID</b><br>
<span id="walletChain">-</span>
</div>
</div>
</div>

<div class="actions">
<button class="btn-blue" onclick="connectWallet()">Connect</button>
<button class="btn-gray" onclick="disconnectWallet()">Disconnect</button>
<button class="btn-blue" onclick="switchArc()">Switch Arc</button>
<button class="btn-dark" onclick="connectCircle()">Login Google / Circle</button>
<button class="btn-green" onclick="payNow()">Pay Now</button>
<button onclick="setupPin()">Setup Circle PIN</button>
</div>

<div class="small" style="margin-top:16px" id="payMsg">
Open invoice first.
</div>

</div>
</div>

<div class="qrbox">
<img id="qrImage"/>
<br><br>
<a id="standaloneLink" href="#" target="_blank">Open checkout</a>
</div>

</div>
</div>

</div>
</div>

<!-- WEB3 -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<!-- CIRCLE -->
<script type="module">
  import { W3SSdk } from "https://esm.sh/@circle-fin/w3s-pw-web-sdk?target=es2020";
  window.W3SSdk = W3SSdk;
  console.log("Circle W3SSdk loaded:", W3SSdk);
</script>

<script>
let currentInvoice = null;
let wallet = null;

const ARC_CHAIN_ID = 5042002;
const ARC_CHAIN_HEX = "0x4cef52";
const ARC_RPC = "https://rpc.testnet.arc.network";
const ARC_EXPLORER = "https://testnet.arcscan.app";

const USDC_TOKEN = "0x3600000000000000000000000000000000000000";
const USDC_DECIMALS = 6;

const ERC20_ABI = [
{
constant:false,
inputs:[
{name:"_to",type:"address"},
{name:"_value",type:"uint256"}
],
name:"transfer",
outputs:[{name:"",type:"bool"}],
type:"function"
},
{
constant:true,
inputs:[{name:"owner",type:"address"}],
name:"balanceOf",
outputs:[{name:"",type:"uint256"}],
type:"function"
}
];

function qs(id){
return document.getElementById(id);
}

function msg(t){
qs("payMsg").innerHTML=t;
}

function format(n){
return Number(n||0).toLocaleString("en-US",{
maximumFractionDigits:6
});
}

/* =========================
LOAD INVOICES
========================= */
async function loadInvoices(){
const res = await fetch("/api/invoices");
const data = await res.json();

qs("invoiceList").innerHTML = "";

(data.invoices||[]).forEach(inv=>{
qs("invoiceList").innerHTML += `
<div class="invoice-item">
<div class="invoice-title">${inv.title}</div>
<div>${format(inv.amount)} USDC</div>
<div class="small">${inv.id}</div>
<div style="margin-top:10px">
<button class="btn-dark" onclick="openInvoice('${inv.id}')">Open</button>
</div>
</div>
`;
});
}

async function createInvoice(){
const body = {
title:qs("title").value,
amount:qs("amount").value,
recipientAddress:qs("recipient").value,
targetChain:"Arc",
note:qs("note").value
};

const res = await fetch("/api/invoices",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
});

const data = await res.json();

if(!data.ok){
msg('<span class="error">'+data.error+'</span>');
return;
}

currentInvoice = data.invoice;
renderInvoice(currentInvoice);
await loadInvoices();
msg("Invoice created.");
}

async function openInvoice(id){
const res = await fetch("/api/invoices/"+id);
const data = await res.json();

currentInvoice = data.invoice;
renderInvoice(currentInvoice);
}

function renderInvoice(inv){
qs("viewTitle").innerText = inv.title;
qs("viewAmount").innerText = format(inv.amount)+" USDC";
qs("viewId").innerText = inv.id;
qs("viewRecipient").innerText = inv.recipientAddress;
qs("statusBadge").innerText = inv.status;

qs("qrImage").src =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+
encodeURIComponent(location.origin+"/pay/"+inv.id);

qs("standaloneLink").href =
location.origin+"/pay/"+inv.id;
}

/* =========================
WALLET
========================= */
async function connectWallet(){
if(!window.ethereum){
alert("Install MetaMask");
return;
}

const accounts = await ethereum.request({
method:"eth_requestAccounts"
});

wallet = accounts[0];

qs("walletAddress").innerText = wallet;

const cid = await ethereum.request({
method:"eth_chainId"
});

qs("walletChain").innerText =
parseInt(cid,16);

loadBalance();

msg("Wallet connected.");
}

function disconnectWallet(){
wallet = null;

qs("walletAddress").innerText =
"Disconnected";

qs("walletChain").innerText = "-";
qs("walletBalance").innerText = "- USDC";

msg("Disconnected.");
}

async function switchArc(){
try{
await ethereum.request({
method:"wallet_switchEthereumChain",
params:[{chainId:ARC_CHAIN_HEX}]
});
}catch(e){

await ethereum.request({
method:"wallet_addEthereumChain",
params:[{
chainId:ARC_CHAIN_HEX,
chainName:"Arc Testnet",
rpcUrls:[ARC_RPC],
nativeCurrency:{
name:"ETH",
symbol:"ETH",
decimals:18
},
blockExplorerUrls:[ARC_EXPLORER]
}]
});

}

msg("Switched to Arc.");
}

async function loadBalance(){
try{
const web3 = new Web3(window.ethereum);

const token = new web3.eth.Contract(
ERC20_ABI,
USDC_TOKEN
);

const raw = await token.methods
.balanceOf(wallet)
.call();

const bal =
Number(raw) / Math.pow(10,USDC_DECIMALS);

qs("walletBalance").innerText =
format(bal)+" USDC";

}catch(e){
qs("walletBalance").innerText =
"Unavailable";
}
}

/* =========================
PAY
========================= */
async function payNow(){

if(!wallet){
msg('<span class="error">Connect wallet first</span>');
return;
}

if(!currentInvoice){
msg('<span class="error">Open invoice first</span>');
return;
}

try{

const web3 = new Web3(window.ethereum);

const token = new web3.eth.Contract(
ERC20_ABI,
USDC_TOKEN
);

const amount =
web3.utils.toBN(
Math.floor(
Number(currentInvoice.amount)*1000000
).toString()
);

const tx = await token.methods
.transfer(
currentInvoice.recipientAddress,
amount
)
.send({
from:wallet
});

await fetch(
"/api/invoices/"+currentInvoice.id+"/mark-paid",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
txHash:tx.transactionHash,
fromAddress:wallet
})
}
);

msg('<span class="success">Payment success</span>');

currentInvoice.status = "PAID";
renderInvoice(currentInvoice);

}catch(e){
msg('<span class="error">'+e.message+'</span>');
}
}

/* =========================
CIRCLE LOGIN
========================= */
async function connectCircle(){

const res = await fetch("/api/circle/config");
const data = await res.json();

const clientId =
data.config.googleClientId;

if(!clientId){
alert("Missing GOOGLE_CLIENT_ID");
return;
}

window.location.href =
"https://accounts.google.com/o/oauth2/v2/auth"+
"?client_id="+encodeURIComponent(clientId)+
"&redirect_uri="+encodeURIComponent(location.origin)+
"&response_type=token"+
"&scope="+encodeURIComponent("openid email profile");
}

/* =========================
SETUP PIN
========================= */
async function setupPin(){

msg("Starting Circle PIN setup...");

const hash = location.hash;

if(!hash.includes("access_token")){
msg("Login Google first.");
return;
}

const params =
new URLSearchParams(hash.replace("#",""));

const token =
params.get("access_token");

const user = await fetch(
"https://www.googleapis.com/oauth2/v3/userinfo",
{
headers:{
Authorization:"Bearer "+token
}
}
).then(r=>r.json());

const email = user.email;

const tokenRes = await fetch(
"/api/circle/user-token",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}
);

const tokenData = await tokenRes.json();

const userToken =
tokenData?.data?.userToken;

const encryptionKey =
tokenData?.data?.encryptionKey;

if(!userToken || !encryptionKey){
msg("No Circle token.");
return;
}

const cfg =
await fetch("/api/circle/config")
.then(r=>r.json());

const appId =
cfg.config.circleAppId;

const initRes = await fetch(
"/api/circle/initialize-user",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({userToken})
}
);

const initData =
await initRes.json();

const challengeId =
initData?.data?.challengeId;

const sdk = new window.W3SSdk({
appSettings:{appId}
});

sdk.setAuthentication({
userToken,
encryptionKey
});

sdk.execute(challengeId,
async(error,result)=>{

if(error){
msg("PIN setup failed");
return;
}

msg("PIN setup success.");

});
}

/* ========================= */
function copyAddress(){
navigator.clipboard.writeText(
qs("viewRecipient").innerText
);
msg("Copied.");
}

loadInvoices();
</script>
</body>
</html>
